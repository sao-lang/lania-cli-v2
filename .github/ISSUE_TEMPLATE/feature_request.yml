name: Feature Request
description: Propose a feature or workflow enhancement
title: '[feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What alternatives have you considered?
  - type: textarea
    id: release-impact
    attributes:
      label: Release Impact
      description: Which packages or commands would be affected?
