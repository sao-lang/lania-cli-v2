name: Publish Verdaccio Smoke

on:
  pull_request:
    paths:
      - '.github/workflows/publish-verdaccio-smoke.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/**'
      - 'ts/packages/node-bridge/src/plugins/product.ts'
      - 'ts/packages/node-bridge/src/plugins/product.test.ts'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-verdaccio-smoke.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/**'
      - 'ts/packages/node-bridge/src/plugins/product.ts'
      - 'ts/packages/node-bridge/src/plugins/product.test.ts'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Verdaccio Smoke
        run: pnpm publish:verdaccio
